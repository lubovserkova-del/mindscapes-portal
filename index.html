*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#293138;
  --heights:#424D58;
  --storm:#7F91A4;
  --aurora:#D5E7FF;
  --flare:#FFFFFF;
  --storm-light:rgba(127,145,164,0.12);
  --storm-mid:rgba(127,145,164,0.25);
}
body{font-family:'Gilroy',sans-serif;background:var(--flare);color:var(--dark);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid rgba(127,145,164,0.18);background:var(--flare);}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.logo-svg{width:36px;height:22px}
.nav-brand{font-size:17px;font-weight:600;color:var(--dark);letter-spacing:-0.3px}
.nav-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--storm)}
.nav-breadcrumb span{cursor:pointer;transition:color .2s}
.nav-breadcrumb span:hover{color:var(--dark)}
.nav-breadcrumb .sep{color:var(--storm-mid);cursor:default}
.nav-breadcrumb .current{color:var(--heights);font-weight:600;cursor:default}
.nav-tag{background:var(--aurora);color:var(--heights);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.hero{position:relative;padding:64px 48px 56px;overflow:hidden;background:#293138;flex-shrink:0;position:relative;overflow:hidden}
.hero-arcs{position:absolute;right:-40px;top:0;bottom:0;width:55%;pointer-events:none}
.hero-content{position:relative;z-index:3;max-width:520px}
.hero-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--storm);margin-bottom:16px}
.hero-title{font-size:42px;font-weight:400;color:var(--flare);line-height:1.15;letter-spacing:-1px;margin-bottom:12px}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.75);font-weight:400;line-height:1.6}
.search-bar{padding:24px 48px;border-bottom:1px solid rgba(127,145,164,0.12);display:flex;align-items:center;gap:12px}
.search-input{flex:1;max-width:400px;height:40px;border:1px solid rgba(127,145,164,0.3);border-radius:8px;padding:0 14px;font-size:14px;font-family:'Gilroy',sans-serif;color:var(--dark);background:var(--flare);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--storm)}
.search-input::placeholder{color:var(--storm)}
.results-count{font-size:13px;color:var(--storm);margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:40px 48px 64px}
.client-card{background:var(--flare);border:1px solid rgba(127,145,164,0.2);border-radius:16px;cursor:pointer;transition:all .25s;overflow:hidden;display:flex;flex-direction:column}
.client-card:hover{border-color:var(--storm);transform:translateY(-2px);box-shadow:0 8px 32px rgba(41,49,56,0.08)}
.card-thumb{height:140px;position:relative;overflow:hidden;flex-shrink:0}
.card-thumb svg{width:100%;height:100%}
.card-body{padding:20px 22px 22px;flex:1;display:flex;flex-direction:column}
.card-badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:12px;margin-bottom:10px}
.badge-fmcg{background:#EAF3DE;color:#3B6D11}
.badge-finance{background:#E6F1FB;color:#185FA5}
.badge-pharma{background:#FBEAF0;color:#993556}
.badge-tech{background:#EEEDFE;color:#3C3489}
.badge-retail{background:#FAECE7;color:#993C1D}
.badge-travel{background:#E1F5EE;color:#0F6E56}
.badge-media{background:#FAEEDA;color:#854F0B}
.card-name{font-size:18px;font-weight:600;color:var(--dark);margin-bottom:6px;letter-spacing:-.3px}
.card-meta{font-size:13px;color:var(--storm);line-height:1.5;flex:1}
.card-footer{margin-top:14px;display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid rgba(127,145,164,0.12)}
.card-count{font-size:12px;color:var(--storm);font-weight:600}
.card-arrow{width:28px;height:28px;border-radius:50%;background:var(--storm-light);display:flex;align-items:center;justify-content:center;transition:background .2s}
.client-card:hover .card-arrow{background:var(--storm)}
.arrow-icon{font-size:14px;color:var(--storm);transition:color .2s}
.client-card:hover .arrow-icon{color:white}
.project-card{background:var(--flare);border:1px solid rgba(127,145,164,0.2);border-radius:16px;cursor:pointer;transition:all .25s;overflow:hidden}
.project-card:hover{border-color:var(--storm);transform:translateY(-2px);box-shadow:0 8px 32px rgba(41,49,56,0.08)}
.proj-thumb{height:120px;position:relative;overflow:hidden}
.proj-thumb svg{width:100%;height:100%}
.proj-body{padding:18px 20px 20px}
.proj-type{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--storm);margin-bottom:8px}
.proj-title{font-size:16px;font-weight:600;color:var(--dark);margin-bottom:6px;line-height:1.35}
.proj-desc{font-size:13px;color:var(--storm);line-height:1.5}
.proj-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid rgba(127,145,164,0.12)}
.proj-date{font-size:12px;color:var(--storm)}
.proj-files{display:flex;gap:6px}
.file-chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.chip-pdf{background:#FAECE7;color:#993C1D}
.chip-pptx{background:#E6F1FB;color:#185FA5}
.chip-xlsx{background:#EAF3DE;color:#3B6D11}
.chip-html{background:#EEEDFE;color:#3C3489}
.client-hero{background:#D5E7FF;padding:48px 48px 42px;position:relative;overflow:hidden;border-bottom:1px solid rgba(127,145,164,0.15)}
.client-hero-arcs{position:absolute;right:0;top:0;width:40%;height:100%;pointer-events:none;opacity:.5}
.client-hero-content{position:relative;z-index:2}
.client-hero-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--storm);margin-bottom:10px}
.client-hero-name{font-size:36px;font-weight:600;color:var(--dark);letter-spacing:-1px;margin-bottom:10px}
.client-hero-desc{font-size:15px;color:var(--heights);max-width:560px;line-height:1.65}
.client-hero-stats{display:flex;gap:32px;margin-top:28px}
.stat-item{display:flex;flex-direction:column;gap:3px}
.stat-val{font-size:22px;font-weight:600;color:var(--dark)}
.stat-label{font-size:11px;color:var(--storm);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.section-header{padding:32px 48px 16px;display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:14px;font-weight:600;color:var(--heights);letter-spacing:.5px;text-transform:uppercase}
.filter-row{display:flex;gap:8px}
.filter-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid rgba(127,145,164,0.3);background:transparent;color:var(--storm);cursor:pointer;font-family:'Gilroy',sans-serif;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:var(--dark);color:white;border-color:var(--dark)}
@media(max-width:600px){
  nav{padding:16px 20px}
  .hero,.client-hero{padding:40px 20px 36px}
  .grid{padding:24px 20px 48px;grid-template-columns:1fr}
  .search-bar{padding:16px 20px}
  .section-header{padding:24px 20px 12px;flex-direction:column;align-items:flex-start;gap:12px}
}
</style>

let currentClient=null;
function makeClientCard(c){
  const el=document.createElement('div');
  el.className='client-card';
  el.innerHTML=`<div class="card-thumb">${makeArcSvg(c.colorIdx,140)}</div><div class="card-body"><span class="card-badge ${c.badge}">${c.sector}</span><div class="card-name">${c.name}</div><div class="card-meta">${c.desc}</div><div class="card-footer"><span class="card-count">${c.projects} проектов · ${c.years}</span><div class="card-arrow"><span class="arrow-icon">→</span></div></div></div>`;
  el.onclick=()=>openClient(c.id);
  return el;
}
function makeProjectCard(p,idx){
  const el=document.createElement('div');
  el.className='project-card';
  if(p.htmlFiles&&p.htmlFiles.length){
    el.style.cursor='pointer';
    el.onclick=()=>window.open(p.htmlFiles[0].url,'_blank');
  }
  const chips=p.files.map(f=>`<span class="file-chip chip-${f}">${f.toUpperCase()}</span>`).join('');
  let filesHtml=`<div class="proj-files">${chips}</div>`;
  if(p.htmlFiles&&p.htmlFiles.length){
    const links=p.htmlFiles.map(f=>`<a href="${f.url}" target="_blank" onclick="event.stopPropagation()" style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:#EEEDFE;color:#3C3489;text-decoration:none;white-space:nowrap">${f.name}</a>`).join('');
    filesHtml=`<div class="proj-files" style="flex-wrap:wrap;gap:5px">${links}</div>`;
  }
  el.innerHTML=`<div class="proj-thumb">${makeArcSvg(idx%8,120)}</div><div class="proj-body"><div class="proj-type">${p.typeLabel}</div><div class="proj-title">${p.title}</div><div class="proj-desc">${p.desc}</div></div><div class="proj-footer"><span class="proj-date">${p.date}</span>${filesHtml}</div>`;
  return el;
}
function renderClients(list){
  const g=document.getElementById('clients-grid');
  g.innerHTML='';
  list.forEach(c=>g.appendChild(makeClientCard(c)));
  document.getElementById('client-count').textContent=list.length+' клиент'+(list.length===1?'':'ов');
}
function filterClients(){
  const q=document.getElementById('client-search').value.toLowerCase();
  renderClients(CLIENTS.filter(c=>c.name.toLowerCase().includes(q)||c.sector.toLowerCase().includes(q)));
}
function openClient(id){
  currentClient=CLIENTS.find(c=>c.id===id);
  document.getElementById('breadcrumb-name').textContent=currentClient.name;
  document.getElementById('ch-sector').textContent=currentClient.sector;
  document.getElementById('ch-name').textContent=currentClient.name;
  document.getElementById('ch-desc').textContent=currentClient.desc;
  const projs=PROJECTS[id]||[];
  const qual=projs.filter(p=>p.type==='qual').length;
  const quant=projs.filter(p=>p.type==='quant').length;
  document.getElementById('ch-stats').innerHTML=`<div class="stat-item"><div class="stat-val">${projs.length}</div><div class="stat-label">Проектов</div></div><div class="stat-item"><div class="stat-val">${qual}</div><div class="stat-label">Качественных</div></div><div class="stat-item"><div class="stat-val">${quant}</div><div class="stat-label">Количественных</div></div>`;
  document.querySelectorAll('.filter-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderProjects('all');
  document.getElementById('screen-clients').classList.remove('active');
  document.getElementById('screen-projects').classList.add('active');
  window.scrollTo(0,0);
}
function renderProjects(f){
  const projs=(PROJECTS[currentClient.id]||[]).filter(p=>f==='all'||p.type===f);
  const g=document.getElementById('projects-grid');
  g.innerHTML='';
  projs.forEach((p,i)=>g.appendChild(makeProjectCard(p,i)));
}
function filterProjects(f,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects(f);
}
function goHome(){
  document.getElementById('screen-projects').classList.remove('active');
  document.getElementById('screen-clients').classList.add('active');
  window.scrollTo(0,0);
}
renderClients(CLIENTS);
</script>
